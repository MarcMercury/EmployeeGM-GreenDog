name: Secret Sentinel

on:
  pull_request:
    paths:
      - 'app/**'
      - 'server/**'
      - 'scripts/**'
      - '.github/workflows/**'
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'server/**'
      - 'scripts/**'
      - '.github/workflows/**'

jobs:
  scan:
    name: Scan Changed Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Secret Sentinel
        env:
          SECRET_SENTINEL_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          SECRET_SENTINEL_HEAD: ${{ github.sha }}
        run: node scripts/security/secret-sentinel.mjs
